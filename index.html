<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobin Icecream Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #e0f2ff 0%, #4facfe 100%);
            min-height: 100vh;
            font-family: 'Nanum Pen Script', cursive;
            color: #2c3e50;
            overflow-x: hidden;
        }

        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            font-family: 'Fredoka One', cursive;
            color: #7a9cff;
            line-height: 1.1;
            text-shadow: 2px 2px 0px white;
        }

        .logo h1 { margin: 0; font-size: 4rem; }
        .logo p { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }

        .menu-icon {
            font-size: 2.5rem;
            cursor: pointer;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* 아이스크림 아이템 레이아웃 */
        .icecream-item {
            display: flex;
            align-items: center;
            margin-bottom: 80px; /* 두 개뿐이라 간격을 넉넉히 */
            width: 100%;
        }

        /* 첫 번째: 사진 왼쪽, 이름 오른쪽 */
        .item-1 {
            flex-direction: row;
        }

        /* 두 번째: 이름 왼쪽, 사진 오른쪽 (스케치 반영) */
        .item-2 {
            flex-direction: row-reverse;
            justify-content: flex-start;
        }

        .circle-img {
            width: 300px;
            height: 300px;
            background-color: rgba(255, 255, 255, 0.7);
            border: 10px solid #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .circle-img:hover {
            transform: scale(1.05) rotate(-5deg);
            border-color: #7a9cff;
        }

        .name-tag {
            font-size: 3.5rem; /* 이름을 더 크게 강조 */
            padding: 0 50px;
            white-space: nowrap;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .icecream-item, .item-2 { flex-direction: column; text-align: center; }
            .circle-img { width: 200px; height: 200px; }
            .name-tag { padding: 20px 0; font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Bobin</h1>
        <p>AND THE<br>ICECREAM FACTORY</p>
    </div>
    <div class="menu-icon">≡</div>
</header>

<div class="container">
    <div class="icecream-item item-1">
        <div class="circle-img">- 1</div>
        <div class="name-tag">-</div>
    </div>

    <div class="icecream-item item-2">
        <div class="circle-img">- 2</div>
        <div class="name-tag">-</div>
    </div>
</div>

</body>
</html>
